<!DOCTYPE html>
<html>
  <head>
    <title>Bill</title>
     <style>
      h1{
        text-align:center;
      }
      #items {
         width: 500px;
         padding: 24px;
         margin:50px auto;
         background: linear-gradient(135deg, #ffffff, #f6f7fb);
         border-radius: 16px;
         border: 1px solid rgba(0, 0, 0, 0.05);
         box-shadow:   0 10px 25px ;
         font-family: 'Poppins', sans-serif;
         color: #333;
         transition: all 0.3s ease;
       }
      #items:hover {
         transform: translateY(-4px);
         box-shadow: 0 16px 35px rgba(0, 0, 0, 0.12);
       }
    body
     {
      background-color:#DED3C4;
     }  
    #billDialog
     {
       background-color:#E5E1DA;
       width:300px;
       height:250px;
       border:none;
       border-radius:15px;
       padding:30px;
       box-shadow:0 10px 40px rgba(0 ,0 ,0 ,0.25);
     }
     #billDetails{
       font-size:18px;
       line-height:1.8;
       margin-top:10px;
     }
     button{
       display:block;
       padding :10px 25px;
       font-size:16px;
       border:none;
       border-radius:8px;
       background:#A67B5B;
       color:white;
       cursor:pointer;
       transition:0.3s;
      }
     button:hover{
       background-color:#6F4E37;
       transform:scale(1.05);
      }
     </style>
  </head>
  <body>
    <h1>Order Details </h1>
    <div id="items"></div></center>
    <center><button onclick="generateBill()">Generate Bill</button></center>
    <dialog id="billDialog">
      <h2>Bill Summary</h2>
      <p id="billDetails"></p>
      <center><button onclick="document.getElementById('billDialog').close()">Close</button></center>
   </dialog>
    <script>
   // Object for key-value pair
      let items = {};
      let total = 0;
      let n = parseInt(prompt("Enter number of items you want to buy:"));

      for (let i = 1; i <= n; i++) {
         let name = prompt("Enter name of item " + i + ":");
         let price = parseFloat(prompt("Enter price of " + name + ":"));
         items[name] = price;
      }

     let itemD = document.getElementById("items");
     itemD.innerHTML = "<h3>Items </h3>";
    for (let item in items) {
       itemD.innerHTML += item + " : " + items[item] + "/-<br>";
       total += items[item];
    }

   function generateBill()
 {
      let discount = 0;
      if (total > 5000) {
         discount = total * 0.10;
       }
      let finalAmount = total - discount;
      document.getElementById("billDetails").innerHTML=
          "Total Bill: ₹ " + total +"<br>"+
          "\nDiscount: ₹" + discount +"<br>"+
          "\n<b>Final Payable Amount: ₹" + finalAmount+" </b>";
     document.getElementById('billDialog').showModal();
     }
    </script>
  </body>
</html>
